# Build Hugo site and deploy to GitHub Pages.
# First-time repo setup: Settings → Pages → Source: "GitHub Actions".
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deploy; queue the rest, cancel stale runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  HUGO_VERSION: 0.162.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo (extended)
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for .GitInfo / .Lastmod if we enable it

      - name: Fetch private commercial fonts
        # Clones sonny1508/sonny-fonts (private) into assets/fonts/ using a
        # fine-grained PAT stored as FONTS_REPO_TOKEN. The fonts are licensed
        # for use but not for public redistribution, so they live in a
        # separate private repo rather than in this public one.
        #
        # If the secret is missing (e.g. fork), the step skips gracefully and
        # the deploy proceeds with system font fallbacks.
        env:
          FONTS_TOKEN: ${{ secrets.FONTS_REPO_TOKEN }}
        run: |
          if [ -z "$FONTS_TOKEN" ]; then
            echo "::warning::FONTS_REPO_TOKEN not set — building without commercial fonts."
            exit 0
          fi
          echo "Cloning private fonts repo..."
          git clone --depth=1 \
            "https://x-access-token:${FONTS_TOKEN}@github.com/sonny1508/sonny-fonts.git" \
            assets/fonts
          echo "Fonts in place:"
          ls -la assets/fonts/

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          TZ: UTC
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
